name: feature-nodejs-pipeline

on:
  workflow_call:
    inputs:
      project:
        required: true
        type: string
      environment:
        required: false
        type: string
        default: true
      component:
        required: false
        type: string
        default: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug input
        run: |
              echo "Branch: ${{ github.ref }}"
              echo "Component: ${{ inputs.component }}"
              echo "Component: ${{ inputs.environment }}"
              echo "Component: ${{ inputs.project }}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # - name: Run tests
      #   if: ${{ inputs.run-tests }}
      #   run: npm test

      # - name: Build app
      #   if: ${{ inputs.run-build }}
      #   run: npm run build

